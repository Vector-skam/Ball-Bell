<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Ball Crusher ∞</title>
  <style>
    body { 
      margin: 0; 
      overflow: hidden; 
      background: #0a0a1f; 
      font-family: Arial, sans-serif;
      touch-action: none;
    }
    canvas { display: block; }

    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      color: #fff;
      z-index: 100;
      pointer-events: none;
      text-shadow: 0 2px 8px rgba(0,0,0,0.8);
    }
    #score {
      font-size: 32px;
      font-weight: bold;
      color: #00ffff;
    }
    #title {
      font-size: 22px;
      margin-bottom: 6px;
    }

    #instructions {
      position: absolute;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      color: #bbb;
      font-size: 17px;
      text-align: center;
      pointer-events: none;
      text-shadow: 0 2px 6px rgba(0,0,0,0.7);
    }

    #leftZone, #rightZone {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 50%;
      opacity: 0;
      z-index: 10;
    }
    #leftZone { left: 0; }
    #rightZone { right: 0; }
  </style>
</head>
<body>
  <div id="ui">
    <div id="title">BALL CRUSHER ∞</div>
    <div>Счёт: <span id="score">0</span></div>
  </div>

  <div id="instructions">
    Свайпни влево / вправо<br>или держи палец на стороне экрана
  </div>

  <div id="leftZone"></div>
  <div id="rightZone"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script>
    let scene, camera, renderer;
    let ball;
    let score = 0;
    let speed = 0.65;
    let targetLane = 0;   // -1 лево, 0 центр, 1 право
    let currentLane = 0;

    const tiles = [];
    const bonuses = [];
    const roadSegments = [];

    let lastTouchX = 0;
    let isTouching = false;

    function init() {
      scene = new THREE.Scene();
      scene.fog = new THREE.Fog(0x0a0a1f, 70, 280);

      camera = new THREE.PerspectiveCamera(65, window.innerWidth / window.innerHeight, 0.1, 500);
      camera.position.set(0, 18, 40);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setSize(window.innerWidth, window.innerHeight);
      renderer.shadowMap.enabled = true;
      document.body.appendChild(renderer.domElement);

      // Свет
      scene.add(new THREE.AmbientLight(0x6677aa, 0.8));
      const sun = new THREE.DirectionalLight(0xffffff, 1.2);
      sun.position.set(25, 45, 35);
      scene.add(sun);

      createBall();
      createInitialRoad();

      // Сенсорное управление
      const leftZone = document.getElementById('leftZone');
      const rightZone = document.getElementById('rightZone');

      leftZone.addEventListener('touchstart', () => targetLane = -1);
      rightZone.addEventListener('touchstart', () => targetLane = 1);
      leftZone.addEventListener('touchend', () => targetLane = 0);
      rightZone.addEventListener('touchend', () => targetLane = 0);

      // Дополнительно — свайп по всему экрану
      renderer.domElement.addEventListener('touchstart', onTouchStart);
      renderer.domElement.addEventListener('touchmove', onTouchMove);
      renderer.domElement.addEventListener('touchend', onTouchEnd);

      window.addEventListener('resize', onResize);

      animate();
    }

    function createBall() {
      ball = new THREE.Mesh(
        new THREE.SphereGeometry(1.25, 32, 32),
        new THREE.MeshPhongMaterial({ 
          color: 0x00eeff, 
          shininess: 90,
          emissive: 0x0099bb
        })
      );
      ball.position.set(0, 1.3, 15);
      ball.castShadow = true;
      scene.add(ball);
    }

    function createRoadSegment(z) {
      const road = new THREE.Mesh(
        new THREE.PlaneGeometry(20, 28),
        new THREE.MeshPhongMaterial({ color: 0x1a1a2e })
      );
      road.rotation.x = -Math.PI / 2;
      road.position.set(0, 0.05, z);
      road.receiveShadow = true;
      scene.add(road);
      roadSegments.push(road);

      // Белые линии разметки
      for (let i = -1; i <= 1; i++) {
        const line = new THREE.Mesh(
          new THREE.PlaneGeometry(0.5, 14),
          new THREE.MeshPhongMaterial({ color: 0xeeeeee })
        );
        line.rotation.x = -Math.PI / 2;
        line.position.set(i * 5.8, 0.12, z);
        scene.add(line);
      }
    }

    function createInitialRoad() {
      for (let i = 0; i < 15; i++) {
        createRoadSegment(-40 + i * 22);
      }
    }

    function generateNewTile() {
      const lastZ = tiles.length ? Math.min(...tiles.map(t => t.position.z)) : -50;
      const z = lastZ - 14;

      // Плитка
      const tile = new THREE.Mesh(
        new THREE.BoxGeometry(6.5, 0.9, 9),
        new THREE.MeshPhongMaterial({
          color: Math.random() > 0.5 ? 0x0066ff : 0xff2266
        })
      );
      tile.position.set((Math.random() - 0.5) * 5, 0.45, z);
      tile.userData.value = Math.random() > 0.55 ? 
        Math.floor(Math.random() * 900) + 300 : 
        -Math.floor(Math.random() * 400) - 150;
      
      scene.add(tile);
      tiles.push(tile);

      // Бонус
      if (Math.random() > 0.4) {
        const bonus = createBonus(tile.userData.value);
        bonus.position.set(tile.position.x, 4.5, z);
        scene.add(bonus);
        bonuses.push({ mesh: bonus, value: tile.userData.value, z: z });
      }

      // Удаляем старые сегменты дороги и плитки
      cleanupOldObjects();
    }

    function createBonus(value) {
      const group = new THREE.Group();
      const box = new THREE.Mesh(
        new THREE.BoxGeometry(3.8, 2, 1.2),
        new THREE.MeshPhongMaterial({ color: value > 0 ? 0x00ff99 : 0xff3366 })
      );
      group.add(box);

      const canvas = document.createElement('canvas');
      canvas.width = 256; canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#ffffff';
      ctx.font = 'bold 70px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(value > 0 ? '+' + value : value, 128, 72);

      const texture = new THREE.CanvasTexture(canvas);
      const sprite = new THREE.Sprite(new THREE.SpriteMaterial({ map: texture }));
      sprite.scale.set(4.8, 2.4, 1);
      group.add(sprite);

      return group;
    }

    function cleanupOldObjects() {
      const camZ = camera.position.z;

      // Удаляем старые плитки
      for (let i = tiles.length - 1; i >= 0; i--) {
        if (tiles[i].position.z > camZ + 20) {
          scene.remove(tiles[i]);
          tiles.splice(i, 1);
        }
      }

      // Удаляем старые бонусы
      for (let i = bonuses.length - 1; i >= 0; i--) {
        if (bonuses[i].z > camZ + 20) {
          scene.remove(bonuses[i].mesh);
          bonuses.splice(i, 1);
        }
      }

      // Удаляем старые сегменты дороги
      for (let i = roadSegments.length - 1; i >= 0; i--) {
        if (roadSegments[i].position.z > camZ + 30) {
          scene.remove(roadSegments[i]);
          roadSegments.splice(i, 1);
        }
      }
    }

    function onTouchStart(e) {
      isTouching = true;
      lastTouchX = e.touches[0].clientX;
    }

    function onTouchMove(e) {
      if (!isTouching) return;
      const currentX = e.touches[0].clientX;
      const diff = currentX - lastTouchX;

      if (diff < -40) targetLane = -1;
      else if (diff > 40) targetLane = 1;

      lastTouchX = currentX;
    }

    function onTouchEnd() {
      isTouching = false;
      // Плавно возвращаемся в центр, если не держим зону
      setTimeout(() => {
        if (!document.querySelector('#leftZone:active') && 
            !document.querySelector('#rightZone:active')) {
          targetLane = 0;
        }
      }, 100);
    }

    function onKey(e) {
      if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') targetLane = -1;
      if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') targetLane = 1;
    }

    function onResize() {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    }

    function animate() {
      requestAnimationFrame(animate);

      // Движение шарика вперёд + ускорение
      ball.position.z -= speed;
      speed = Math.min(speed + 0.0012, 1.35);

      // Плавное движение между полосами
      currentLane += (targetLane - currentLane) * 0.22;
      const targetX = currentLane * 5.2;
      ball.position.x += (targetX - ball.position.x) * 0.28;

      // Вращение шарика
      ball.rotation.x += speed * 0.18;
      ball.rotation.z = currentLane * 0.6;

      // Камера следует за шариком
      camera.position.z = ball.position.z + 42;
      camera.position.y = 17 + Math.sin(Date.now()/800) * 1.5;
      camera.lookAt(ball.position.x * 0.4, 5, ball.position.z - 15);

      // Генерация новых плиток
      if (tiles.length === 0 || tiles[tiles.length-1].position.z > ball.position.z - 120) {
        generateNewTile();
      }

      checkCollisions();

      renderer.render(scene, camera);
    }

    function checkCollisions() {
      for (let i = tiles.length - 1; i >= 0; i--) {
        const tile = tiles[i];
        const distZ = Math.abs(ball.position.z - tile.position.z);

        if (distZ < 3.5 && Math.abs(ball.position.x - tile.position.x) < 5) {
          score += tile.userData.value;
          document.getElementById('score').textContent = score;

          // Эффект исчезновения плитки
          tile.position.y = -20;

          // Убираем связанный бонус
          for (let j = bonuses.length - 1; j >= 0; j--) {
            if (Math.abs(bonuses[j].z - tile.position.z) < 5) {
              scene.remove(bonuses[j].mesh);
              bonuses.splice(j, 1);
            }
          }

          tiles.splice(i, 1);
          break;
        }
      }

      // Падение
      if (ball.position.y < -10) {
        gameOver();
      }
    }

    function gameOver() {
      alert(`💥 Крушение!\n\nТвой счёт: ${score}\n\nНажми OK, чтобы начать заново.`);
      resetGame();
    }

    function resetGame() {
      score = 0;
      speed = 0.65;
      targetLane = 0;
      currentLane = 0;
      ball.position.set(0, 1.3, 15);
      document.getElementById('score').textContent = '0';

      tiles.forEach(t => scene.remove(t));
      bonuses.forEach(b => scene.remove(b.mesh));
      roadSegments.forEach(r => scene.remove(r));

      tiles.length = 0;
      bonuses.length = 0;
      roadSegments.length = 0;

      createInitialRoad();
    }

    init();
  </script>
</body>
</html>
